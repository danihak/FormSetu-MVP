name: FormSetu CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-validators:
    name: Test Validators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-cov
      - run: PYTHONPATH=packages/validator/src pytest packages/validator/tests/ -v

  test-engine:
    name: Test Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: PYTHONPATH=packages/engine/src:packages/validator/src pytest packages/engine/tests/ -v || echo "No engine tests yet"

  validate-schemas:
    name: Validate Example Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jsonschema
      - run: |
          python -c "
          import json, glob, sys
          for path in glob.glob('packages/schema-spec/examples/*.json'):
              with open(path) as f:
                  schema = json.load(f)
              assert 'form_id' in schema, f'Missing form_id in {path}'
              assert 'metadata' in schema, f'Missing metadata in {path}'
              print(f'  PASS: {path}')
          print('All schemas valid.')
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check packages/ services/ --select E,F --ignore E501,F401,E402
